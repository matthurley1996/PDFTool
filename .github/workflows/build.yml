name: Build executables

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract + Ghostscript (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract ghostscript

      - name: Install Tesseract + Ghostscript (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install --no-progress -y tesseract ghostscript

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Stage OCR binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p bin tessdata
          cp "$(which tesseract)" bin/
          cp "$(which gs)" bin/
          cp "$(brew --prefix)/share/tessdata/eng.traineddata" tessdata/ || true

      - name: Stage OCR binaries (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p bin tessdata
          cp "/c/Program Files/Tesseract-OCR/tesseract.exe" bin/ || true
          cp "/c/Program Files/Tesseract-OCR/tessdata/eng.traineddata" tessdata/ || true
          find "/c/Program Files/gs" -name "gswin64c.exe" -exec cp {} bin/gs.exe \; || true

      - name: Build with PyInstaller
        run: pyinstaller pdftool.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdftool-${{ runner.os }}
          path: dist/*
